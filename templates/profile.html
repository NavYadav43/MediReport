{% extends 'base.html' %}
{% block title %}Profile — MediReport{% endblock %}
{% block content %}
<div class="main-content" style="max-width:600px;margin:0 auto">
    <h1 style="font-size:1.8rem;font-weight:700;margin-bottom:2rem">👤 My Profile</h1>
    <div class="card">
        <form method="POST" style="display:flex;flex-direction:column;gap:1rem">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group"><label>First Name</label><input type="text" name="first_name" class="form-control" value="{{ user.first_name }}"></div>
                <div class="form-group"><label>Last Name</label><input type="text" name="last_name" class="form-control" value="{{ user.last_name }}"></div>
            </div>
            <div class="form-group"><label>Username</label><input type="text" class="form-control" value="{{ user.username }}" disabled style="opacity:0.5"></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" value="{{ user.email }}"></div>
            <button type="submit" class="btn btn-primary" style="align-self:flex-start"><i class="fas fa-save"></i> Save Changes</button>
        </form>
    </div>
    <div class="card" style="margin-top:1.5rem">
        <h3 style="margin-bottom:0.5rem">Account Info</h3>
        <p style="color:var(--text-muted);font-size:0.875rem">Member since {{ user.date_joined|date:"M d, Y" }}</p>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.25rem">Total reports: {{ user.reports.count }}</p>
    </div>
</div>
{% endblock %}
