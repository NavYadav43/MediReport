{% extends 'base.html' %}
{% block title %}Delete Report — MediReport{% endblock %}
{% block content %}
<div class="main-content" style="max-width:500px;margin:0 auto;padding-top:4rem;text-align:center">
    <div style="font-size:4rem;margin-bottom:1.5rem">🗑️</div>
    <h1 style="font-size:1.5rem;margin-bottom:0.5rem">Delete Report?</h1>
    <p style="color:var(--text-muted);margin-bottom:2rem">Are you sure you want to delete "<strong>{{ report.title }}</strong>"? This action cannot be undone.</p>
    <div style="display:flex;gap:1rem;justify-content:center">
        <a href="{% url 'report_detail' report.pk %}" class="btn btn-outline">Cancel</a>
        <form method="POST" style="display:inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Yes, Delete</button>
        </form>
    </div>
</div>
{% endblock %}
